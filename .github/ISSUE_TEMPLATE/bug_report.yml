name: Bug report
description: Report a problem with the app or repository.
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the issue clearly and concisely.
      placeholder: The app crashes when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Tap...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any stack trace, logs, or attach screenshots that help diagnose the problem.
      placeholder: Exception stack trace, console output, or screen recording links.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Flutter version, device, and platform.
      placeholder: Flutter 3.29.2, Pixel 7, Android 14
  - type: input
    id: frequency
    attributes:
      label: Frequency
      description: How often does this happen?
      placeholder: Always, sometimes, once after login, etc.