name: Feature request
description: Propose an improvement or new capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you want to add.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What should be true for this request to be considered complete?
      placeholder: |
        - User can...
        - Offline behavior...
        - Error states...
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add mockups, references, constraints, or related links if relevant.
  - type: input
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Note other approaches you considered.