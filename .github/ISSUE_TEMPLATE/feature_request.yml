name: Feature request
description: Suggest an improvement or new capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you want to add.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add mockups, references, or constraints if relevant.