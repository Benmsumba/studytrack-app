name: Build & Test

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: 17
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Get dependencies
        run: |
          cd studytrack
          flutter pub get
      
      - name: Static analysis
        run: |
          cd studytrack
          flutter analyze lib/
      
      - name: Format check
        run: |
          cd studytrack
          dart format --set-exit-if-changed lib/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Get dependencies
        run: |
          cd studytrack
          flutter pub get
      
      - name: Run tests
        run: |
          cd studytrack
          flutter test --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./studytrack/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  notify:
    name: Verify Build Success
    runs-on: ubuntu-latest
    needs: [ analyze, test ]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.analyze.result }}" = "failure" ] || [ "${{ needs.test.result }}" = "failure" ]; then
            echo "❌ Build verification failed"
            exit 1
          else
            echo "✅ Build verification successful"
          fi
