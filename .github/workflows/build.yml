name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'studytrack/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'studytrack/**'
      - '.github/workflows/build.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 17

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: studytrack
        run: flutter pub get

      - name: Analyze project
        working-directory: studytrack
        run: flutter analyze --no-fatal-warnings --no-fatal-infos lib/

      - name: Check formatting
        working-directory: studytrack
        run: |
          dart format --output=none lib/ 2>&1 | tee /tmp/fmt.txt
          if grep -q "Changed" /tmp/fmt.txt; then
            echo "::warning::Some files are not correctly formatted. Run 'dart format lib/' locally."
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: studytrack
        run: flutter pub get

      - name: Run tests
        working-directory: studytrack
        run: flutter test

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./studytrack/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true
