name: Build & Test

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: 17
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Get dependencies
        run: |
          cd studytrack
          flutter pub get
      
      - name: Static analysis
        run: |
          cd studytrack
          flutter analyze lib/
      
      - name: Format check
        run: |
          cd studytrack
          dart format --set-exit-if-changed lib/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Get dependencies
        run: |
          cd studytrack
          flutter pub get
      
      - name: Run tests
        run: |
          cd studytrack
          flutter test --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./studytrack/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Get dependencies
        run: |
          cd studytrack
          flutter pub get
      
      - name: Configure signing for release builds
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          cd studytrack/android
          echo "storeFile=keystore.jks" > key.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> key.properties
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > app/keystore.jks
      
      - name: Build APK (Release)
        run: |
          cd studytrack
          flutter build apk --release
      
      - name: Build AAB (Play Store)
        run: |
          cd studytrack
          flutter build appbundle --release
      
      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: app-release-apk
          path: studytrack/build/app/outputs/apk/release/app-release.apk
          retention-days: 30
      
      - name: Upload AAB to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: app-release-aab
          path: studytrack/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download APK
        uses: actions/download-artifact@v3
        with:
          name: app-release-apk
      
      - name: Download AAB
        uses: actions/download-artifact@v3
        with:
          name: app-release-aab
      
      - name: Create checksums
        run: |
          sha256sum app-release.apk > checksums.txt
          sha256sum app-release.aab >> checksums.txt
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-release.apk
            app-release.aab
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [ analyze, test ]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.analyze.result }}" = "failure" ] || [ "${{ needs.test.result }}" = "failure" ]; then
            echo "❌ Build failed"
            exit 1
          else
            echo "✅ Build successful"
          fi
