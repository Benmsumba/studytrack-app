name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: 17
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Install dependencies
        run: |
          cd studytrack
          flutter pub get
      
      - name: Analyze project
        run: |
          cd studytrack
          flutter analyze lib/
      
      - name: Check formatting
        run: |
          cd studytrack
          dart format --set-exit-if-changed lib/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Install dependencies
        run: |
          cd studytrack
          flutter pub get
      
      - name: Run tests
        run: |
          cd studytrack
          flutter test --coverage
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./studytrack/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
