name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Install dependencies
        working-directory: studytrack
        run: flutter pub get

      - name: Analyze
        working-directory: studytrack
        run: flutter analyze

      - name: Run tests
        working-directory: studytrack
        run: flutter test

      - name: Build APK (split per ABI)
        working-directory: studytrack
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: studytrack-apk-${{ github.run_number }}
          path: studytrack/build/app/outputs/flutter-apk/*.apk

      - name: Create release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: StudyTrack v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: |
            studytrack/build/app/outputs/flutter-apk/*.apk
