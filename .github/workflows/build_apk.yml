name: Manual Debug APK Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: build-debug-apk-${{ github.event.inputs.branch || github.ref_name || github.ref }}
  cancel-in-progress: true

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name || github.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        working-directory: studytrack
        run: flutter pub get

      - name: Check formatting (advisory)
        working-directory: studytrack
        run: |
          dart format --output=none . 2>&1 | tee /tmp/fmt.txt
          if grep -q "Changed" /tmp/fmt.txt; then
            echo "::warning::Some files are not correctly formatted. Run 'dart format .' locally."
          fi

      - name: Analyze project
        working-directory: studytrack
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run tests
        working-directory: studytrack
        run: flutter test

      - name: Build debug APK
        working-directory: studytrack
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL="${SUPABASE_URL}" \
            --dart-define=SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY}" \
            --dart-define=GEMINI_API_KEY="${GEMINI_API_KEY}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudyTrack-v1-debug
          path: studytrack/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
