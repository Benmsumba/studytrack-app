name: Publish OTA Update Metadata

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name shown to users (e.g. 1.2.0)'
        required: false
        default: ''
      release_notes:
        description: 'Message shown in the update banner'
        required: false
        default: 'A new version of StudyTrack is available.'

permissions:
  contents: read

concurrency:
  group: trigger-update-latest-json-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Check required secrets
    runs-on: ubuntu-latest
    outputs:
      secrets_ok: ${{ steps.check.outputs.secrets_ok }}
    steps:
      - name: Verify
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TRIMMED_KEY=$(echo "${SUPABASE_SERVICE_ROLE_KEY}" | tr -d '[:space:]')
          if [ -z "${SUPABASE_URL}" ] || [ -z "${TRIMMED_KEY}" ]; then
            echo "::warning::Required secrets are not set. Skipping update publish."
            echo "secrets_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_ok=true" >> "$GITHUB_OUTPUT"
          fi

  push-version-json:
    name: Publish latest.json
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.secrets_ok == 'true'
    timeout-minutes: 5

    steps:
      - name: Ensure app-updates bucket is public
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl --silent -X POST "${SUPABASE_URL}/storage/v1/bucket" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"id":"app-updates","name":"app-updates","public":true}' || true
          curl --silent -X PUT "${SUPABASE_URL}/storage/v1/bucket/app-updates" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"public":true}'

      - name: Create and upload latest.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          VERSION_CODE=$((10000 + GITHUB_RUN_NUMBER))
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "${VERSION_NAME}" ]; then
            VERSION_NAME="$(date +'%Y.%m.%d')"
          fi
          NOTES="${{ github.event.inputs.release_notes }}"

          cat > /tmp/latest.json <<JSONEOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "downloadUrl": "${SUPABASE_URL}/storage/v1/object/public/app-updates/studytrack-latest.apk",
            "download_url": "${SUPABASE_URL}/storage/v1/object/public/app-updates/studytrack-latest.apk",
            "releaseNotes": "${NOTES}",
            "release_notes": "${NOTES}",
            "changelog": "${NOTES}",
            "wifiOnly": false
          }
          JSONEOF

          echo "Uploading latest.json (versionCode=${VERSION_CODE})"
          cat /tmp/latest.json

          HTTP_STATUS=$(curl --silent --show-error --output /tmp/upload_response.txt \
            --write-out "%{http_code}" \
            -X PUT "${SUPABASE_URL}/storage/v1/object/app-updates/latest.json" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            --data-binary @/tmp/latest.json)

          echo "HTTP status: ${HTTP_STATUS}"
          cat /tmp/upload_response.txt

          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "::error::latest.json upload failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi

          echo "latest.json uploaded successfully"
          echo "Public URL: ${SUPABASE_URL}/storage/v1/object/public/app-updates/latest.json"
