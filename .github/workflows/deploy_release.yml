name: Deploy Release APK

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=0
          for key in SUPABASE_URL SUPABASE_ANON_KEY GEMINI_API_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare signing material
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p ~/.android
          KEYSTORE_FILE="$HOME/.android/studytrack-release.jks"
          
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"
            if ! test -s "$KEYSTORE_FILE"; then
              echo "::error::Failed to decode keystore from base64"
              exit 1
            fi
            echo "Using repository-provided keystore secrets"
            {
              echo "KEYSTORE_PATH=$KEYSTORE_FILE"
              echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
              echo "KEY_ALIAS=$KEY_ALIAS"
              echo "KEY_PASSWORD=$KEY_PASSWORD"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          # Generate CI keystore with proper error handling
          echo "Generating CI keystore for this build..."
          set +e  # Don't exit on error yet
          keytool -genkeypair \
            -alias studyaid-ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125 \
            -keystore "$KEYSTORE_FILE" \
            -storepass studyaid_ci_store_pass \
            -keypass studyaid_ci_key_pass \
            -noprompt \
            -dname "CN=StudyAId CI, OU=Mobile, O=StudyAId, L=NA, S=NA, C=US" 2>&1
          
          KEYTOOL_EXIT=$?
          set -e
          
          if [ $KEYTOOL_EXIT -ne 0 ] || ! test -f "$KEYSTORE_FILE"; then
            echo "::warning::Keystore generation failed, using debug keystore as fallback"
            DEBUG_KEYSTORE="$HOME/.android/debug.keystore"
            if [ ! -f "$DEBUG_KEYSTORE" ]; then
              echo "Creating debug keystore..."
              keytool -genkeypair \
                -alias androiddebugkey \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -keystore "$DEBUG_KEYSTORE" \
                -storepass android \
                -keypass android \
                -noprompt \
                -dname "CN=Android Debug, O=Android, C=US"
            fi
            KEYSTORE_FILE="$DEBUG_KEYSTORE"
          fi

          # Verify keystore is readable
          if ! keytool -list -keystore "$KEYSTORE_FILE" -storepass studyaid_ci_store_pass > /dev/null 2>&1 && \
             ! keytool -list -keystore "$KEYSTORE_FILE" -storepass android > /dev/null 2>&1; then
            echo "::error::Keystore verification failed"
            exit 1
          fi
          
          echo "Keystore ready at $KEYSTORE_FILE"
          
          if [ "$KEYSTORE_FILE" = "$HOME/.android/debug.keystore" ]; then
            {
              echo "KEYSTORE_PATH=$KEYSTORE_FILE"
              echo "KEYSTORE_PASSWORD=android"
              echo "KEY_ALIAS=androiddebugkey"
              echo "KEY_PASSWORD=android"
            } >> "$GITHUB_ENV"
          else
            {
              echo "KEYSTORE_PATH=$KEYSTORE_FILE"
              echo "KEYSTORE_PASSWORD=studyaid_ci_store_pass"
              echo "KEY_ALIAS=studyaid-ci"
              echo "KEY_PASSWORD=studyaid_ci_key_pass"
            } >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        working-directory: studytrack
        run: flutter pub get

      - name: Analyze
        working-directory: studytrack
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Extract version from pubspec.yaml
        id: ver
        working-directory: studytrack
        run: |
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          VERSION=$(echo "$RAW" | cut -d'+' -f1)
          BUILD=${GITHUB_RUN_NUMBER}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "Detected version=$VERSION build=$BUILD"

      - name: Build release APK
        working-directory: studytrack
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: |
          flutter build apk --release --split-per-abi \
            --build-name="${{ steps.ver.outputs.version }}" \
            --build-number="${{ steps.ver.outputs.build }}" \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --tree-shake-icons \
            --dart-define=SUPABASE_URL="${SUPABASE_URL}" \
            --dart-define=SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY}" \
            --dart-define=GEMINI_API_KEY="${GEMINI_API_KEY}"

      - name: Show built APK sizes
        run: |
          ls -lh studytrack/build/app/outputs/flutter-apk/
          du -h studytrack/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl --fail -X POST \
            "${SUPABASE_URL}/storage/v1/object/app-updates/studytrack-latest.apk" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            -H "cache-control: no-cache" \
            --data-binary @studytrack/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          echo "APK uploaded"

      - name: Generate and upload version.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cat > /tmp/version.json << JSONEOF
          {
            "versionCode": ${{ steps.ver.outputs.build }},
            "versionName": "${{ steps.ver.outputs.version }}",
            "downloadUrl": "${SUPABASE_URL}/storage/v1/object/public/app-updates/studytrack-latest.apk",
            "releaseNotes": "StudyAId ${{ steps.ver.outputs.version }} is available."
          }
          JSONEOF

          curl --fail -X POST \
            "${SUPABASE_URL}/storage/v1/object/app-updates/version.json" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            -H "cache-control: no-cache" \
            --data-binary @/tmp/version.json
          echo "version.json uploaded"
          cat /tmp/version.json
