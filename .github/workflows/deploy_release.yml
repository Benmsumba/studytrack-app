name: Release APK Builder

on:
  push:
    branches:
      - main
    paths:
      - 'studytrack/**'
      - '.github/workflows/deploy_release.yml'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-secrets:
    name: Check required secrets
    runs-on: ubuntu-latest
    outputs:
      secrets_ok: ${{ steps.check.outputs.secrets_ok }}
      can_publish: ${{ steps.check.outputs.can_publish }}
    steps:
      - name: Verify secrets
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=0
          for key in SUPABASE_URL SUPABASE_ANON_KEY GEMINI_API_KEY; do
            if [ -z "${!key}" ]; then
              echo "::warning::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "secrets_ok=false" >> "$GITHUB_OUTPUT"
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "Release build skipped: required secrets are not configured."
          else
            echo "secrets_ok=true" >> "$GITHUB_OUTPUT"
            if [ -n "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
              echo "can_publish=true" >> "$GITHUB_OUTPUT"
            else
              echo "can_publish=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.secrets_ok == 'true'
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show commit info
        run: |
          echo "SHA: ${{ github.sha }}"
          git --no-pager log -1 --oneline || true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        working-directory: studytrack
        run: flutter pub get

      - name: Analyze project
        working-directory: studytrack
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Read version from pubspec.yaml
        id: ver
        working-directory: studytrack
        run: |
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          VERSION=$(echo "$RAW" | cut -d'+' -f1)
          BUILD=$((10000 + GITHUB_RUN_NUMBER))
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "Version $VERSION, build $BUILD"

      - name: Prepare signing material
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p ~/.android
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            KEYSTORE_FILE="$HOME/.android/production.jks"
            echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"
            if ! test -s "$KEYSTORE_FILE"; then
              echo "::error::Failed to decode keystore from base64"
              exit 1
            fi
            echo "Using production signing keystore."
            {
              echo "KEYSTORE_PATH=$KEYSTORE_FILE"
              echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
              echo "KEY_ALIAS=$KEY_ALIAS"
              echo "KEY_PASSWORD=$KEY_PASSWORD"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Using Android debug keystore for CI builds."
          DEBUG_KEYSTORE="$HOME/.android/debug.keystore"
          if [ ! -f "$DEBUG_KEYSTORE" ]; then
            keytool -genkeypair \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore "$DEBUG_KEYSTORE" \
              -storepass android \
              -keypass android \
              -noprompt \
              -dname "CN=Android Debug, O=Android, C=US" || true
          fi
          {
            echo "KEYSTORE_PATH=$DEBUG_KEYSTORE"
            echo "KEYSTORE_PASSWORD=android"
            echo "KEY_ALIAS=androiddebugkey"
            echo "KEY_PASSWORD=android"
          } >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: studytrack
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build apk --release --target-platform=android-arm64 \
            --build-name="${{ steps.ver.outputs.version }}" \
            --build-number="${{ steps.ver.outputs.build }}" \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --tree-shake-icons \
            --dart-define=SUPABASE_URL="${SUPABASE_URL}" \
            --dart-define=SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY}" \
            --dart-define=GEMINI_API_KEY="${GEMINI_API_KEY}"

      - name: Verify build output
        run: |
          APK_FILE=$(find studytrack/build/app/outputs -name "*release*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "::error::No release APK found."
            exit 1
          fi
          echo "Release APK: $APK_FILE ($(du -h "$APK_FILE" | cut -f1))"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudyTrack-release-arm64-${{ steps.ver.outputs.version }}
          path: studytrack/build/app/outputs/flutter-apk/*release*.apk
          retention-days: 30

      - name: Upload debug symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudyTrack-symbols-${{ steps.ver.outputs.version }}
          path: studytrack/build/app/outputs/symbols/
          retention-days: 30

      - name: Ensure app-updates bucket is public
        if: needs.check-secrets.outputs.can_publish == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl --silent -X POST "${SUPABASE_URL}/storage/v1/bucket" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"id":"app-updates","name":"app-updates","public":true}' || true

          UPDATE_STATUS=$(curl --silent --write-out "%{http_code}" --output /dev/null \
            -X PUT "${SUPABASE_URL}/storage/v1/bucket/app-updates" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"public":true}')
          if [ "${UPDATE_STATUS}" -lt 200 ] || [ "${UPDATE_STATUS}" -ge 300 ]; then
            echo "::error::Failed to ensure app-updates bucket is public (HTTP ${UPDATE_STATUS})"
            exit 1
          fi

      - name: Upload APK to Supabase Storage
        if: needs.check-secrets.outputs.can_publish == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          APK_FILE=$(find studytrack/build/app/outputs -name "*release*.apk" | head -1)
          HTTP_STATUS=$(curl --silent --show-error --output /tmp/apk_upload.txt \
            --write-out "%{http_code}" \
            -X PUT \
            "${SUPABASE_URL}/storage/v1/object/app-updates/studytrack-latest.apk" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary @"$APK_FILE")
          cat /tmp/apk_upload.txt
          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "::error::APK upload failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi
          echo "APK uploaded successfully"

      - name: Publish latest.json
        if: needs.check-secrets.outputs.can_publish == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          APK_PATH=$(find studytrack/build/app/outputs -name "*release*.apk" | head -1)
          APK_SHA256=$(sha256sum "${APK_PATH}" | awk '{print $1}')
          cat > /tmp/latest.json << EOF
          {
            "versionCode": ${{ steps.ver.outputs.build }},
            "versionName": "${{ steps.ver.outputs.version }}",
            "downloadUrl": "${{ secrets.SUPABASE_URL }}/storage/v1/object/public/app-updates/studytrack-latest.apk",
            "releaseNotes": "StudyTrack ${{ steps.ver.outputs.version }} is available.",
            "apkSha256": "${APK_SHA256}",
            "wifiOnly": false
          }
          EOF

          HTTP_STATUS=$(curl --silent --show-error --output /tmp/latest_upload.txt \
            --write-out "%{http_code}" \
            -X PUT \
            "${SUPABASE_URL}/storage/v1/object/app-updates/latest.json" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            --data-binary @/tmp/latest.json)
          cat /tmp/latest_upload.txt
          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "::error::latest.json upload failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi
          echo "latest.json published:"
          cat /tmp/latest.json
