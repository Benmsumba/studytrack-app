name: Deploy Release APK

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Install dependencies
        working-directory: studytrack
        run: flutter pub get

      - name: Analyze
        working-directory: studytrack
        run: flutter analyze --no-fatal-warnings

      - name: Build release APK
        working-directory: studytrack
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${SUPABASE_URL}" \
            --dart-define=SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY}" \
            --dart-define=GEMINI_API_KEY="${GEMINI_API_KEY}"

      - name: Extract version from pubspec.yaml
        id: ver
        working-directory: studytrack
        run: |
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          VERSION=$(echo "$RAW" | cut -d'+' -f1)
          BUILD=$(echo "$RAW" | cut -d'+' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "Detected version=$VERSION build=$BUILD"

      - name: Upload APK to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl --fail -X POST \
            "${SUPABASE_URL}/storage/v1/object/app-updates/studytrack-latest.apk" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            -H "cache-control: no-cache" \
            --data-binary @studytrack/build/app/outputs/flutter-apk/app-release.apk
          echo "APK uploaded successfully"

      - name: Generate and upload version.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cat > /tmp/version.json << JSONEOF
          {
            "version": "${{ steps.ver.outputs.version }}",
            "build": ${{ steps.ver.outputs.build }},
            "apk_url": "${SUPABASE_URL}/storage/v1/object/public/app-updates/studytrack-latest.apk",
            "release_notes": "StudyTrack ${{ steps.ver.outputs.version }} is available.",
            "min_build": 1
          }
          JSONEOF

          curl --fail -X POST \
            "${SUPABASE_URL}/storage/v1/object/app-updates/version.json" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            -H "cache-control: no-cache" \
            --data-binary @/tmp/version.json
          echo "version.json uploaded successfully"
          cat /tmp/version.json
