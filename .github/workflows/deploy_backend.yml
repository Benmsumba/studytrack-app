name: Deploy Supabase Backend

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy_backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-supabase-backend-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        id: secret_check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Supabase secrets not configured. Skipping deploy."
            echo "Add SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF to GitHub Secrets."
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "Secrets found. Proceeding with deploy."
          fi

      - name: Link project
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy database schema
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Pushing database schema..."
          supabase db push
          echo "Database schema deployed."

      - name: Deploy Edge Functions
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Deploying Edge Functions..."
          supabase functions deploy process-document --no-verify-jwt
          echo "Edge Function deployed."
          echo "URL: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/process-document"

      - name: List deployed functions
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions list
