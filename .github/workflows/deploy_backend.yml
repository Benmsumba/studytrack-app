name: Deploy Supabase Backend

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy_backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-supabase-backend-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Allow supabase CLI's internal git calls to work in any directory.
      GIT_CONFIG_COUNT: '1'
      GIT_CONFIG_KEY_0: 'safe.directory'
      GIT_CONFIG_VALUE_0: '*'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 1.200.3

      - name: Validate required secrets
        id: secret_check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=0
          for var in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::warning::Missing secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Required secrets not configured; skipping deploy."
            echo "SUPABASE_DB_PASSWORD is the database password from:"
            echo "  Supabase dashboard → project Settings → Database → Database password"
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "All required secrets present."
          fi

      - name: Validate token and project ref
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # Reject obvious wrong formats before hitting the API.
          if echo "$SUPABASE_PROJECT_REF" | grep -qE "^https?://|\.supabase\.co|\.com"; then
            echo "::error::SUPABASE_PROJECT_REF looks like a URL. It must be the short"
            echo "::error::alphanumeric project ID only (e.g. abcdefghijklmnop)."
            echo "::error::Find it at: Supabase dashboard → project Settings → General → Reference ID"
            exit 1
          fi

          # Verify the Personal Access Token by calling the Management API.
          HTTP=$(curl -s -o /tmp/projects.json -w "%{http_code}" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            "https://api.supabase.com/v1/projects")

          if [ "$HTTP" != "200" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is invalid or expired (Management API returned HTTP $HTTP)."
            echo "::error::This secret must be a Personal Access Token (PAT) — NOT the anon key or service role key."
            echo "::error::Generate one at: https://supabase.com/dashboard/account/tokens"
            cat /tmp/projects.json
            exit 1
          fi

          # Confirm the project ref exists in this account.
          FOUND=$(jq -r --arg r "$SUPABASE_PROJECT_REF" '.[] | select(.id == $r) | .id' /tmp/projects.json)
          if [ -z "$FOUND" ]; then
            echo "::error::Project ref '${SUPABASE_PROJECT_REF}' was not found in your Supabase account."
            echo "::error::Your available project IDs:"
            jq -r '.[].id' /tmp/projects.json
            exit 1
          fi
          echo "Token valid. Project '${SUPABASE_PROJECT_REF}' confirmed."

      - name: Resolve pooler URL
        id: pooler
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # Direct DB host (db.PROJECT_REF.supabase.co) is now IPv6-only and
          # GitHub Actions runners have no IPv6 connectivity, so connections
          # fail with "network is unreachable". The Supavisor pooler is IPv4
          # and is the documented workaround. Region must match the project.
          REGION=$(jq -r --arg r "$SUPABASE_PROJECT_REF" \
            '.[] | select(.id == $r) | .region' /tmp/projects.json)
          if [ -z "$REGION" ] || [ "$REGION" = "null" ]; then
            echo "::error::Could not determine project region from Management API."
            exit 1
          fi
          # Supabase regions in the API are like "us-east-1", "eu-west-2" — the
          # pooler hostname uses the same identifier with an "aws-0-" prefix.
          POOLER_HOST="aws-0-${REGION}.pooler.supabase.com"
          echo "Project region: $REGION"
          echo "Pooler host: $POOLER_HOST"
          echo "host=$POOLER_HOST" >> "$GITHUB_OUTPUT"

      - name: Verify database password
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          POOLER_HOST: ${{ steps.pooler.outputs.host }}
        run: |
          sudo apt-get install -y --no-install-recommends postgresql-client >/dev/null 2>&1
          # Session mode (port 5432) — drop-in replacement for direct DB.
          psql -h "$POOLER_HOST" -U "postgres.${SUPABASE_PROJECT_REF}" \
               -d postgres -p 5432 -c "select 1"

      - name: Push database schema
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          POOLER_HOST: ${{ steps.pooler.outputs.host }}
        run: |
          ENCODED_PASS=$(python3 -c \
            "import urllib.parse, sys; print(urllib.parse.quote(sys.stdin.read().strip(), safe=''))" \
            <<< "$SUPABASE_DB_PASSWORD")

          DB_URL="postgresql://postgres.${SUPABASE_PROJECT_REF}:${ENCODED_PASS}@${POOLER_HOST}:5432/postgres"

          # Baseline detection: if supabase_migrations.schema_migrations is
          # empty (or missing), the project's schema was created out-of-band
          # (SQL editor, dashboard) before being put under migration control.
          # Trying to re-apply migrations would fail with "already exists".
          # Mark every local migration as already applied so only future
          # migrations actually run.
          APPLIED_COUNT=$(psql -h "$POOLER_HOST" -U "postgres.${SUPABASE_PROJECT_REF}" \
            -d postgres -p 5432 -tA -c \
            "SELECT count(*) FROM supabase_migrations.schema_migrations" 2>/dev/null \
            | tr -d '[:space:]' || true)
          APPLIED_COUNT=${APPLIED_COUNT:-0}
          echo "Migrations already tracked on remote: $APPLIED_COUNT"

          if [ "$APPLIED_COUNT" = "0" ]; then
            echo "Baselining: marking all local migrations as applied (schema pre-exists)..."
            for f in supabase/migrations/*.sql; do
              ts=$(basename "$f" | grep -oE '^[0-9]{14}')
              if [ -n "$ts" ]; then
                echo "  - repair $ts"
                supabase migration repair --status applied "$ts" --db-url "$DB_URL" 2>&1 | tail -3
              fi
            done
          fi

          echo "Pushing database schema via $POOLER_HOST..."
          set +e
          OUTPUT=$(supabase db push --db-url "$DB_URL" 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            SAFE=$(echo "$OUTPUT" | sed "s/${ENCODED_PASS}/REDACTED/g" \
                                  | sed "s/${SUPABASE_DB_PASSWORD}/REDACTED/g" \
                                  | tr '\n' '|' | head -c 800)
            echo "::error title=supabase db push failed (exit $STATUS)::${SAFE}"
            exit "$STATUS"
          fi
          echo "Database schema deployed."

      - name: Deploy Edge Functions
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # --project-ref bypasses the link requirement for function deploys.
          echo "Deploying gemini-proxy..."
          supabase functions deploy gemini-proxy --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          echo "URL: https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/gemini-proxy"

          echo "Deploying delete-account..."
          supabase functions deploy delete-account --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          echo "URL: https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/delete-account"

      - name: List deployed functions
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase functions list --project-ref "$SUPABASE_PROJECT_REF"
