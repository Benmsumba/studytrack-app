name: Deploy Supabase Backend

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy_backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-supabase-backend-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 1.200.3

      - name: Validate required secrets
        id: secret_check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=0
          for var in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::warning::Missing secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Required secrets not configured; skipping deploy."
            echo "SUPABASE_DB_PASSWORD is the database password from:"
            echo "  Supabase dashboard → project Settings → Database → Database password"
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "All required secrets present."
          fi

      - name: Validate token and project ref
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # Reject obvious wrong formats before hitting the API.
          if echo "$SUPABASE_PROJECT_REF" | grep -qE "^https?://|\.supabase\.co|\.com"; then
            echo "::error::SUPABASE_PROJECT_REF looks like a URL. It must be the short"
            echo "::error::alphanumeric project ID only (e.g. abcdefghijklmnop)."
            echo "::error::Find it at: Supabase dashboard → project Settings → General → Reference ID"
            exit 1
          fi

          # Verify the Personal Access Token by calling the Management API.
          HTTP=$(curl -s -o /tmp/projects.json -w "%{http_code}" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            "https://api.supabase.com/v1/projects")

          if [ "$HTTP" != "200" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is invalid or expired (Management API returned HTTP $HTTP)."
            echo "::error::This secret must be a Personal Access Token (PAT) — NOT the anon key or service role key."
            echo "::error::Generate one at: https://supabase.com/dashboard/account/tokens"
            cat /tmp/projects.json
            exit 1
          fi

          # Confirm the project ref exists in this account.
          FOUND=$(jq -r --arg r "$SUPABASE_PROJECT_REF" '.[] | select(.id == $r) | .id' /tmp/projects.json)
          if [ -z "$FOUND" ]; then
            echo "::error::Project ref '${SUPABASE_PROJECT_REF}' was not found in your Supabase account."
            echo "::error::Your available project IDs:"
            jq -r '.[].id' /tmp/projects.json
            exit 1
          fi
          echo "Token valid. Project '${SUPABASE_PROJECT_REF}' confirmed."

      - name: Verify database password
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Best-effort psql connectivity check. Direct port 5432 is often
          # blocked by cloud firewalls; the pooler region also varies by project.
          # Failures here are warnings only — supabase db push is the real gate.
          sudo apt-get install -y --no-install-recommends postgresql-client >/dev/null 2>&1
          connected=false
          DB_HOST="db.${SUPABASE_PROJECT_REF}.supabase.co"
          if psql -h "$DB_HOST" -U postgres -d postgres -p 5432 \
               -c "select 1" >/dev/null 2>&1; then
            connected=true
          fi

          if [ "$connected" = "false" ]; then
            for region in us-east-1 us-west-1 eu-central-1 ap-southeast-1; do
              DB_HOST="aws-0-${region}.pooler.supabase.com"
              if psql -h "$DB_HOST" -U "postgres.${SUPABASE_PROJECT_REF}" \
                   -d postgres -p 6543 -c "select 1" >/dev/null 2>&1; then
                connected=true
                break
              fi
            done
          fi

          if [ "$connected" = "true" ]; then
            echo "Database connection verified via $DB_HOST."
          else
            echo "::warning::psql pre-check could not reach the database (port/firewall/region)."
            echo "::warning::Continuing — supabase db push will confirm connectivity."
          fi

      - name: Push database schema
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Supabase CLI internally calls `git` to locate the project root.
          # GitHub Actions sandboxes git by default; allow it for this workspace.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # URL-encode the password so special characters don't break the DSN.
          ENCODED_PASS=$(python3 -c \
            "import urllib.parse, sys; print(urllib.parse.quote(sys.stdin.read().strip(), safe=''))" \
            <<< "$SUPABASE_DB_PASSWORD")

          DB_URL="postgresql://postgres:${ENCODED_PASS}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres"
          echo "Pushing database schema..."
          supabase db push --db-url "$DB_URL"
          echo "Database schema deployed."

      - name: Deploy Edge Functions
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # --project-ref bypasses the link requirement for function deploys.
          echo "Deploying gemini-proxy..."
          supabase functions deploy gemini-proxy --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          echo "URL: https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/gemini-proxy"

          echo "Deploying delete-account..."
          supabase functions deploy delete-account --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          echo "URL: https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/delete-account"

      - name: List deployed functions
        if: steps.secret_check.outputs.missing == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase functions list --project-ref "$SUPABASE_PROJECT_REF"
