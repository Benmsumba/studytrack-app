version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: pub
    directory: /studytrack
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    labels:
      - dependencies
      - flutter

  - package-ecosystem: gradle
    directory: /studytrack/android
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - android
